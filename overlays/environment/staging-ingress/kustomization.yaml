---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: IngressRoute
    patch: |-
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ingressroute
      spec:
        tls:
          secretName: staging-certificate-secret
  - target:
      kind: IngressRoute
      name: jellyfin-ingressroute
    patch: |-
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: jellyfin-ingressroute
      spec:
        tls:
          secretName: staging-certificate-secret
