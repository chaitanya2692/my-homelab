---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: IngressRoute
      name: ingressroute-internal
    patch: |-
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ingressroute-internal
      spec:
        tls:
          secretName: staging-certificate-secret
  - target:
      kind: IngressRoute
      name: ingressroute-external
    patch: |-
      ---
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ingressroute-external
      spec:
        tls:
          secretName: staging-certificate-secret
