---
name: Pull Request CI
on: [pull_request] # yamllint disable-line rule:truthy

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: yaml-lint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          config_file: .yamllint.yml

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          fix: true
          globs: "**/*.md"
          config: .markdownlint-cli2.yaml

  validate:
    runs-on: ubuntu-latest
    needs: [markdownlint, yaml-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup yq
        uses: fluxcd/pkg/actions/yq@main
      - name: Setup kubeconform
        uses: fluxcd/pkg/actions/kubeconform@main
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@main
      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3
      - name: Validate repository
        run: ./scripts/validate.sh

  build-overlays:
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - overlays/infra-security
          - overlays/infra
          - overlays/utils
          - overlays/htpc
          - overlays/argocd
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup kustomize
        uses: fluxcd/pkg/actions/kustomize@main
      - name: Build ${{ matrix.path }}
        run: kustomize build "${{ matrix.path }}" --enable-helm --enable-alpha-plugins --enable-exec > /tmp/rendered.yaml

  terraform-plan:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform init (no backend)
        run: terraform -chdir=terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=terraform validate

  detect-secrets:
    runs-on: ubuntu-latest
    needs: [yaml-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.93.8
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
