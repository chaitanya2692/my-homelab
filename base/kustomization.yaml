---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - htpc
  - infra
  - utils
  - cluster

configMapGenerator:
  - name: global-env
    literals:
      - TZ=CET

vars:
  - name: SONARR
    objref:
      apiVersion: v1
      kind: Service
      name: sonarr
  - name: RADARR
    objref:
      apiVersion: v1
      kind: Service
      name: radarr

labels:
  - includeSelectors: true
    pairs:
      app: htpc

images:
  - name: linuxserver/jackett
    newTag: latest
  - name: linuxserver/sonarr
    newTag: latest
  - name: linuxserver/radarr
    newTag: latest
  - name: linuxserver/bazarr
    newTag: latest
  - name: linuxserver/transmission
    newTag: latest
  - name: jellyfin/jellyfin
    newTag: latest
