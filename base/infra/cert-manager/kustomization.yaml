---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infra

resources:
  - issuers
  - certificates

helmCharts:
  - name: cert-manager
    repo: https://charts.jetstack.io
    version: v1.20.2 # helm search repo --regexp 'jetstack/cert-manager[[:space:]]' -o json | jq -r '.[].version'
    releaseName: cert-manager
    includeCRDs: false
    valuesFile: values.yaml
  - name: reflector
    repo: https://emberstack.github.io/helm-charts
    version: 10.0.40
    releaseName: reflector
