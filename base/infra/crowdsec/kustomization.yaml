---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: infra

resources:
  - secret
  - bouncer-middleware.yaml

helmCharts:
  - name: crowdsec
    repo: https://crowdsecurity.github.io/helm-charts
    version: 0.23.0
    releaseName: crowdsec
    namespace: infra
    includeCRDs: false
    valuesFile: values.yaml
