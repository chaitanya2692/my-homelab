---
global:
  enabled: true

server:
  enabled: true
  updateStrategyType: RollingUpdate
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: local-path
  standalone:
    enabled: true
    config: |
      ui = true

      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }

      storage "file" {
        path = "/vault/data"
      }

      telemetry {
        unauthenticated_metrics_access = "true"
      }

ui:
  enabled: true

injector:
  enabled: false

csi:
  enabled: false
