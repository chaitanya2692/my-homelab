---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-auth
  namespace: utils
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: utils
spec:
  address: http://vault.infra.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
  namespace: utils
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: utils-vso
    serviceAccount: vault-auth
    audiences:
      - vault
