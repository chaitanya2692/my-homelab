---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-ratelimit
  namespace: htpc
spec:
  rateLimit:
    average: 100
    burst: 200
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-headers
  namespace: htpc
spec:
  headers:
    customResponseHeaders:
      X-Frame-Options: ""
---
# Separate bouncer for Jellyfin: IP-level bans remain active but AppSec WAF
# is disabled to prevent OWASP CRS false positives on /Sessions/Playing/Progress
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-bouncer
  namespace: htpc
spec:
  plugin:
    crowdsec-bouncer:
      enabled: true
      crowdsecMode: stream
      crowdsecLapiScheme: http
      crowdsecLapiHost: crowdsec-service.infra.svc.cluster.local:8080
      crowdsecLapiKeyFile: /etc/traefik/crowdsec/api-key
      crowdsecAppsecEnabled: false
