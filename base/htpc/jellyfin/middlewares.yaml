---
# CrowdSec bouncer for Jellyfin - AppSec disabled to prevent OWASP CRS false
# positives on /Sessions/Playing/Progress (POST body triggers rules 932370,
# 942190, 901340) which would ban legitimate remote playback clients.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-bouncer
  namespace: htpc
spec:
  plugin:
    crowdsec-bouncer:
      enabled: true
      crowdsecMode: stream
      crowdsecLapiHost: crowdsec-service.infra.svc.cluster.local:8080
      crowdsecLapiKeyFile: /etc/traefik/crowdsec/api-key
      crowdsecLapiScheme: http
      crowdsecAppsecEnabled: false
---
# Headers for Jellyfin - strips X-Frame-Options so the WebOS app's iframe
# can load the Jellyfin web UI (the app uses index.js handoff() to load
# the server UI inside <iframe id="contentFrame">).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jellyfin-headers
  namespace: htpc
spec:
  headers:
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
    accessControlAllowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    accessControlMaxAge: 3600
    addVaryHeader: true
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    referrerPolicy: strict-origin-when-cross-origin
    customRequestHeaders:
      X-Forwarded-Proto: https
    customResponseHeaders:
      X-Frame-Options: ""
      X-Content-Type-Options: nosniff
      X-XSS-Protection: "1; mode=block"
