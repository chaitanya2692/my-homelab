# File: base/htpc/jellyfin/deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: jellyfin
    vpn: gluetun
  name: jellyfin
spec:
  selector:
    matchLabels:
      run: jellyfin
  template:
    metadata:
      labels:
        run: jellyfin
        vpn: gluetun
    spec:
      securityContext:
        supplementalGroups:
          - 992
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wireguard
                  key: WIREGUARD_PRIVATE_KEY
            - name: FIREWALL_INPUT_PORTS
              value: "8096,8920"
            - name: TZ
              value: "CET"
            - name: UPDATER_PERIOD
              value: "720h"
            - name: LOG_LEVEL
              value: "debug"
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
            - name: gluetun-data
              mountPath: /gluetun
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: jellyfin
          image: jellyfin/jellyfin:10.11.11
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "CET"
          securityContext:
            privileged: true
          ports:
            - containerPort: 8096
              protocol: TCP
              name: http
            - containerPort: 8920
              protocol: TCP
          volumeMounts:
            - name: arr-stack-storage
              mountPath: /config
              subPath: jellyfin/config
            - name: arr-stack-storage
              mountPath: /data/media
              subPath: data/media
            - name: "render-device"
              mountPath: "/dev/dri/renderD128"
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "3"
      volumes:
        - name: arr-stack-storage
          persistentVolumeClaim:
            claimName: htpc-pvc
        - name: "render-device"
          hostPath:
            path: "/dev/dri/renderD128"
        - name: tun-device
          hostPath:
            path: /dev/net/tun
        - name: gluetun-data
          emptyDir: {}
