---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: transmission
    vpn: gluetun
  name: transmission
spec:
  replicas: 1
  selector:
    matchLabels:
      run: transmission
  template:
    metadata:
      labels:
        run: transmission
        vpn: gluetun
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:1.38.0
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            [
              "sh",
              "-c",
              "mkdir -p /data/torrents /config /watch && chown -R 1000:1000 /data /config /watch && chmod -R a=,a+rX,u+w,g+w /data /config /watch",
            ]
          volumeMounts:
            - name: arr-stack-storage
              mountPath: /config
              subPath: transmission/config
            - name: arr-stack-storage
              mountPath: /data
              subPath: data
            - name: arr-stack-storage
              mountPath: /watch
              subPath: transmission/watch
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "protonvpn"
            - name: VPN_TYPE
              value: "wireguard"
            - name: DNS_UPSTREAM_RESOLVER_TYPE
              value: "doh"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: protonvpn-wireguard
                  key: WIREGUARD_PRIVATE_KEY
            - name: SERVER_COUNTRIES
              value: "Switzerland"
            - name: PORT_FORWARD_ONLY
              value: "on"
            - name: VPN_PORT_FORWARDING
              value: "on"
            - name: VPN_PORT_FORWARDING_PORTS_COUNT
              value: "1"
            - name: VPN_PORT_FORWARDING_LISTENING_PORT
              value: "51413"
            - name: FIREWALL_INPUT_PORTS
              value: "9091"
            - name: TZ
              value: "CET"
            - name: UPDATER_PERIOD
              value: "720h"
            - name: LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
            - name: gluetun-data
              mountPath: /gluetun
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: transmission
          image: linuxserver/transmission:4.1.2
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "CET"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: download-dir
              value: "/data/torrents"
            - name: PEERPORT
              value: "51413"
          ports:
            - containerPort: 9091
              name: webui
              protocol: TCP
          volumeMounts:
            - name: arr-stack-storage
              mountPath: /config
              subPath: transmission/config
            - name: arr-stack-storage
              mountPath: /data
              subPath: data
            - name: arr-stack-storage
              mountPath: /watch
              subPath: transmission/watch
          resources:
            requests:
              memory: "512Mi"
              cpu: "1"
            limits:
              memory: "1Gi"
              cpu: "3"
      volumes:
        - name: arr-stack-storage
          persistentVolumeClaim:
            claimName: htpc-pvc
        - name: tun-device
          hostPath:
            path: /dev/net/tun
        - name: gluetun-data
          emptyDir: {}
