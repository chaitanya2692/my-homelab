---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: immich-credentials
  namespace: utils
spec:
  type: kv-v2
  mount: kv
  path: utils/immich
  vaultAuthRef: vault-auth
  refreshAfter: 30s
  destination:
    create: true
    name: immich-credentials
    overwrite: true
